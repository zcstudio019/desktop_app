version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loan-assistant-api
    env_file:
      - .env.production
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: loan-assistant-nginx
    depends_on:
      - api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./dist:/srv/loan-assistant/current/dist:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
